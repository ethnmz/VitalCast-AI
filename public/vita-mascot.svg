<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle with gradient -->
  <defs>
    <radialGradient id="circleGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#e8fef0"/>
      <stop offset="100%" stop-color="#a8ebb8"/>
    </radialGradient>
    <radialGradient id="badgeGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#00D154"/>
      <stop offset="100%" stop-color="#00a843"/>
    </radialGradient>
  </defs>

  <!-- Main circle -->
  <circle cx="30" cy="30" r="28" fill="url(#circleGrad)" stroke="rgba(0,209,84,0.2)" stroke-width="0.5"/>

  <!-- Heart -->
  <path d="M30 42l-1.8-1.65C22 35.3 18 31.7 18 27.2 18 23.5 21 20.5 24.6 20.5c1.9 0 3.7.9 5.4 2.5 1.7-1.6 3.5-2.5 5.4-2.5 3.6 0 6.6 3 6.6 6.7 0 4.5-4 8.1-10.2 13.15L30 42z" fill="#004D2C" opacity="0.85"/>

  <!-- Heartbeat line on heart -->
  <path d="M23 29.5h3l1.5-3 2.5 6 1.5-3h3" stroke="#00D154" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Lightning badge -->
  <circle cx="50" cy="50" r="10" fill="url(#badgeGrad)" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
  <path d="M52 44l-5 7h4l-2 5 6-8h-4l1-4z" fill="white"/>
</svg>
